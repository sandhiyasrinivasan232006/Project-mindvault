name: MindVault AI CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Run Unit Tests
        run: flutter test --coverage

      - name: Generate Test Report
        run: |
          echo "# MindVault AI Test Summary" > TEST_REPORT.md
          echo "" >> TEST_REPORT.md
          echo "✅ Flutter Analysis Passed" >> TEST_REPORT.md
          echo "✅ Unit Tests Passed" >> TEST_REPORT.md
          echo "✅ Coverage Generated" >> TEST_REPORT.md

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: MindVault-Test-Report
          path: TEST_REPORT.md
